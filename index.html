<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta name="theme-color" content="#1B4D3E" />
    <meta name="robots" content="index, follow" />
    
    <!-- Favicon Links (self-hosted) -->
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    
    <!-- Google Local Services Ads verification -->
    <meta name="google-site-verification" content="lhdtig6cqjqg" />
    
    <meta name="author" content="Art-is-Tree LLC" />
    <meta name="copyright" content="Art-is-Tree LLC" />
    <meta name="language" content="English" />
    <meta name="geo.region" content="US-VA" />
    <meta name="geo.placename" content="Virginia Beach, Virginia" />
    <meta name="geo.position" content="36.7335;-76.0726" />
    <meta name="ICBM" content="36.7335, -76.0726" />
    <meta name="classification" content="Tree Service, Arboriculture, Home & Garden" />
    <meta name="category" content="Local Business" />
    <meta name="coverage" content="Virginia Beach, Hampton Roads, Virginia" />
    <meta name="revisit-after" content="7 days" />

    <!-- Global social defaults. Per-page title/description/canonical/og/twitter
         are injected per route via <Head> (react-helmet) during prerender. -->
    <meta property="og:site_name" content="Art-is-Tree LLC" />
    <meta property="og:locale" content="en_US" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Preconnect & DNS-Prefetch for Critical Origins -->
    <link rel="preconnect" href="https://djtzvfeyedhwcnwjbwxp.supabase.co" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://images.unsplash.com" crossorigin />
    <link rel="preconnect" href="https://www.googletagmanager.com" />
    
    <!-- Preload Hero Image to improve LCP -->
    <link rel="preload" as="image" href="https://images.unsplash.com/photo-1587541884826-b43073ad974c?auto=format&fit=crop&q=65&w=1024" fetchpriority="high" />

    <!-- Inlined Critical CSS to prevent FOUC & layout shifts -->
    <style id="critical-css">
      body {
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        background-color: #f9fafb;
        color: #09090b;
        -webkit-font-smoothing: antialiased;
      }
      #root { display: flex; flex-direction: column; min-height: 100vh; }
      .contain-content { contain: layout paint style; }
      header { min-height: 72px; background: #fff; width: 100%; border-bottom: 1px solid #eee; }
      .hero-aspect-ratio { aspect-ratio: 16/9; width: 100%; background: #1B4D3E; }
    </style>

    <!-- Deferred Font Loading with fallback -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@600;700&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@600;700&display=swap" media="print" onload="this.media='all'" />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@600;700&display=swap" />
    </noscript>

    <!--
      LocalBusiness / Organization JSON-LD is emitted per-route by the React
      SEO components (LocalBusinessSchema, OrganizationSchema) with a stable
      @id, aggregateRating, and sameAs. A static node here would duplicate and
      compete with those, so it is intentionally omitted.
    -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
